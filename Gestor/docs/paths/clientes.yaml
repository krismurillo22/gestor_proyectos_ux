/clientes:
  get:
    summary: Listar todos los clientes
    tags: [Clientes]
    responses:
      '200':
        description: Lista de clientes
        content:
          application/json:
            example:
              - id_cliente: 1
                nombre: Constructora Hernández
                rtn: "0501-1990-00123"
                activo: true
                telefonos:
                  - telefono: "9901-2345"
                    id_cliente: 1
      '404':
        description: No hay clientes registrados
        content:
          application/json:
            example:
              error: No hay clientes registrados
      '500':
        description: Error del servidor
        content:
          application/json:
            example:
              error: Error del servidor

  post:
    summary: Crear un cliente
    tags: [Clientes]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - nombre
            properties:
              nombre:
                type: string
                minLength: 1
                maxLength: 255
                example: Constructora Hernández
              rtn:
                type: string
                nullable: true
                pattern: '^\d{4}-\d{4}-\d{5}$'
                example: "0501-1990-00123"
    responses:
      '201':
        description: Cliente creado exitosamente
        content:
          application/json:
            example:
              message: Cliente creado exitosamente
              data:
                id_cliente: 7
                nombre: Constructora Hernández
                rtn: "0501-1990-00123"
                activo: true
      '400':
        description: Datos inválidos
        content:
          application/json:
            examples:
              nombre_requerido:
                summary: Nombre requerido
                value:
                  error: El nombre es requerido
              nombre_largo:
                summary: Nombre muy largo
                value:
                  error: El nombre no puede tener más de 255 caracteres
              rtn_invalido:
                summary: RTN con formato incorrecto
                value:
                  error: El RTN debe tener el formato 0000-0000-00000
      '409':
        description: Conflicto - dato duplicado
        content:
          application/json:
            examples:
              nombre_duplicado:
                summary: Nombre duplicado
                value:
                  error: Ya existe un cliente con ese nombre
              rtn_duplicado:
                summary: RTN duplicado
                value:
                  error: Ya existe un cliente con ese RTN
      '500':
        description: Error del servidor
        content:
          application/json:
            example:
              error: Error del servidor

/clientes/buscar:
  get:
    summary: Buscar clientes por nombre
    tags: [Clientes]
    parameters:
      - name: nombre
        in: query
        required: true
        schema:
          type: string
          example: Hernandez
    responses:
      '200':
        description: Clientes encontrados
        content:
          application/json:
            example:
              - id_cliente: 1
                nombre: Constructora Hernández
                rtn: "0501-1990-00123"
                activo: true
      '400':
        description: El nombre es requerido
        content:
          application/json:
            example:
              error: El nombre es requerido
      '404':
        description: No se encontraron clientes
        content:
          application/json:
            example:
              error: No se encontraron clientes con el nombre "Hernandez"
      '500':
        description: Error del servidor
        content:
          application/json:
            example:
              error: Error del servidor

/clientes/{id}:
  get:
    summary: Obtener un cliente por ID
    tags: [Clientes]
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
          example: 1
    responses:
      '200':
        description: Cliente encontrado
        content:
          application/json:
            example:
              id_cliente: 1
              nombre: Constructora Hernández
              rtn: "0501-1990-00123"
              activo: true
              telefonos:
                - telefono: "9901-2345"
                  id_cliente: 1
              solicitudes:
                - id_solicitud: 1
                  descripcion: Remodelación de oficinas
      '400':
        description: ID inválido
        content:
          application/json:
            example:
              error: El ID debe ser un número entero positivo
      '404':
        description: Cliente no encontrado
        content:
          application/json:
            example:
              error: Cliente no encontrado
      '500':
        description: Error del servidor
        content:
          application/json:
            example:
              error: Error del servidor

  patch:
    summary: Actualizar un cliente parcialmente
    tags: [Clientes]
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
          example: 1
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - nombre
            properties:
              nombre:
                type: string
                minLength: 1
                maxLength: 255
                example: Constructora Hernández Actualizada
              rtn:
                type: string
                nullable: true
                pattern: '^\d{4}-\d{4}-\d{5}$'
                example: "0501-1990-00123"
    responses:
      '200':
        description: Cliente actualizado exitosamente
        content:
          application/json:
            example:
              message: Cliente actualizado exitosamente
              data:
                id_cliente: 1
                nombre: Constructora Hernández Actualizada
                rtn: "0501-1990-00123"
                activo: true
      '400':
        description: Datos inválidos
        content:
          application/json:
            examples:
              id_invalido:
                summary: ID inválido
                value:
                  error: El ID debe ser un número entero positivo
              nombre_requerido:
                summary: Nombre requerido
                value:
                  error: El nombre es requerido
              rtn_invalido:
                summary: RTN con formato incorrecto
                value:
                  error: El RTN debe tener el formato 0000-0000-00000
      '404':
        description: Cliente no encontrado
        content:
          application/json:
            example:
              error: Cliente no encontrado
      '409':
        description: Conflicto - dato duplicado
        content:
          application/json:
            examples:
              nombre_duplicado:
                summary: Nombre duplicado
                value:
                  error: Ya existe otro cliente con ese nombre
              rtn_duplicado:
                summary: RTN duplicado
                value:
                  error: Ya existe otro cliente con ese RTN
      '500':
        description: Error del servidor
        content:
          application/json:
            example:
              error: Error del servidor

/clientes/{id}/desactivar:
  patch:
    summary: Desactivar un cliente
    tags: [Clientes]
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
          example: 1
    responses:
      '200':
        description: Cliente desactivado exitosamente
        content:
          application/json:
            example:
              message: Cliente desactivado exitosamente
      '400':
        description: ID inválido
        content:
          application/json:
            example:
              error: El ID debe ser un número entero positivo
      '404':
        description: Cliente no encontrado o ya desactivado
        content:
          application/json:
            example:
              error: Cliente no encontrado o ya está desactivado
      '409':
        description: Tiene solicitudes activas
        content:
          application/json:
            example:
              error: No se puede desactivar el cliente porque tiene solicitudes activas
      '500':
        description: Error del servidor
        content:
          application/json:
            example:
              error: Error del servidor