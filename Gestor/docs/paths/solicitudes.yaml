/solicitudes:
  get:
    summary: Listar todas las solicitudes
    tags: [Solicitudes]
    responses:
      '200':
        description: Lista de solicitudes
        content:
          application/json:
            example:
              - id_solicitud: 1
                id_cliente: 1
                descripcion: Remodelación de oficinas
                fecha: "2026-01-10"
                activo: true
                cliente:
                  id_cliente: 1
                  nombre: Constructora Hernández
      '404':
        description: No hay solicitudes registradas
        content:
          application/json:
            example:
              error: No hay solicitudes registradas
      '500':
        description: Error del servidor
        content:
          application/json:
            example:
              error: Error del servidor

  post:
    summary: Crear una solicitud
    tags: [Solicitudes]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - id_cliente
            properties:
              id_cliente:
                type: integer
                minimum: 1
                example: 1
              descripcion:
                type: string
                nullable: true
                maxLength: 500
                example: Remodelación de oficinas
              fecha:
                type: string
                format: date
                example: "2026-01-10"
    responses:
      '201':
        description: Solicitud creada exitosamente
        content:
          application/json:
            example:
              message: Solicitud creada exitosamente
              data:
                id_solicitud: 8
                id_cliente: 1
                descripcion: Remodelación de oficinas
                fecha: "2026-01-10"
                activo: true
      '400':
        description: Datos inválidos
        content:
          application/json:
            examples:
              id_cliente_requerido:
                summary: id_cliente requerido
                value:
                  error: El id_cliente es requerido
              id_cliente_invalido:
                summary: id_cliente inválido
                value:
                  error: El id_cliente debe ser un número entero positivo
              descripcion_larga:
                summary: Descripción muy larga
                value:
                  error: La descripción no puede tener más de 500 caracteres
              fecha_invalida:
                summary: Fecha con formato inválido
                value:
                  error: La fecha no tiene un formato válido
      '404':
        description: Cliente no encontrado
        content:
          application/json:
            example:
              error: Cliente no encontrado
      '500':
        description: Error del servidor
        content:
          application/json:
            example:
              error: Error del servidor

/solicitudes/cliente/{id_cliente}:
  get:
    summary: Obtener solicitudes de un cliente específico
    tags: [Solicitudes]
    parameters:
      - name: id_cliente
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
          example: 1
    responses:
      '200':
        description: Solicitudes del cliente
        content:
          application/json:
            example:
              - id_solicitud: 1
                id_cliente: 1
                descripcion: Remodelación de oficinas
                fecha: "2026-01-10"
                activo: true
                cotizaciones: []
      '400':
        description: ID inválido
        content:
          application/json:
            example:
              error: El ID del cliente debe ser un número entero positivo
      '404':
        description: No encontrado
        content:
          application/json:
            examples:
              cliente_no_encontrado:
                summary: Cliente no encontrado
                value:
                  error: Cliente no encontrado
              sin_solicitudes:
                summary: Cliente sin solicitudes
                value:
                  error: Este cliente no tiene solicitudes registradas
      '500':
        description: Error del servidor
        content:
          application/json:
            example:
              error: Error del servidor

/solicitudes/{id}:
  get:
    summary: Obtener una solicitud por ID
    tags: [Solicitudes]
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
          example: 1
    responses:
      '200':
        description: Solicitud encontrada
        content:
          application/json:
            example:
              id_solicitud: 1
              id_cliente: 1
              descripcion: Remodelación de oficinas
              fecha: "2026-01-10"
              activo: true
              cliente:
                id_cliente: 1
                nombre: Constructora Hernández
              cotizaciones: []
      '400':
        description: ID inválido
        content:
          application/json:
            example:
              error: El ID debe ser un número entero positivo
      '404':
        description: Solicitud no encontrada
        content:
          application/json:
            example:
              error: Solicitud no encontrada
      '500':
        description: Error del servidor
        content:
          application/json:
            example:
              error: Error del servidor

  patch:
    summary: Actualizar una solicitud parcialmente
    tags: [Solicitudes]
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
          example: 1
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              id_cliente:
                type: integer
                minimum: 1
                example: 1
              descripcion:
                type: string
                nullable: true
                maxLength: 500
                example: Remodelación de oficinas actualizada
              fecha:
                type: string
                format: date
                example: "2026-01-15"
    responses:
      '200':
        description: Solicitud actualizada exitosamente
        content:
          application/json:
            example:
              message: Solicitud actualizada exitosamente
              data:
                id_solicitud: 1
                id_cliente: 1
                descripcion: Remodelación de oficinas actualizada
                fecha: "2026-01-15"
                activo: true
      '400':
        description: Datos inválidos
        content:
          application/json:
            examples:
              id_invalido:
                summary: ID inválido
                value:
                  error: El ID debe ser un número entero positivo
              id_cliente_invalido:
                summary: id_cliente inválido
                value:
                  error: El id_cliente debe ser un número entero positivo
              descripcion_larga:
                summary: Descripción muy larga
                value:
                  error: La descripción no puede tener más de 500 caracteres
              fecha_invalida:
                summary: Fecha con formato inválido
                value:
                  error: La fecha no tiene un formato válido
      '404':
        description: No encontrado
        content:
          application/json:
            examples:
              solicitud_no_encontrada:
                summary: Solicitud no encontrada
                value:
                  error: Solicitud no encontrada
              cliente_no_encontrado:
                summary: Cliente no encontrado
                value:
                  error: Cliente no encontrado
      '500':
        description: Error del servidor
        content:
          application/json:
            example:
              error: Error del servidor

/solicitudes/{id}/desactivar:
  patch:
    summary: Desactivar una solicitud
    tags: [Solicitudes]
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
          example: 1
    responses:
      '200':
        description: Solicitud desactivada exitosamente
        content:
          application/json:
            example:
              message: Solicitud desactivada exitosamente
      '400':
        description: ID inválido
        content:
          application/json:
            example:
              error: El ID debe ser un número entero positivo
      '404':
        description: Solicitud no encontrada o ya desactivada
        content:
          application/json:
            example:
              error: Solicitud no encontrada o ya está desactivada
      '500':
        description: Error del servidor
        content:
          application/json:
            example:
              error: Error del servidor